<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Unified Playlist Network</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <nav>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="post.html">Post Playlist</a>
    </nav>

    <main>
        <h1>Login</h1>

        <p class="description-text">
            Log in to create, save, like, and share playlists from any music platform.
        </p>

        <form id="loginForm">
            <label for="user">Email or Username:</label><br>
            <input type="text" id="user" name="user"><br><br>

            <label for="loginPassword">Password:</label><br>
            <input type="password" id="loginPassword" name="loginPassword"><br><br>

            <input type="submit" value="Login">
        </form>
    </main>

    <script src="scripts/user.js"></script>
</body>
</html>
